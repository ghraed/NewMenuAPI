# Host Apache reverse-proxy (outside Docker)
# Required modules:
#   a2enmod proxy proxy_http proxy_wstunnel rewrite headers
# Replace rozer.fun and the DocumentRoot path to your built frontend

<VirtualHost *:80>
    ServerName rozer.fun
    ServerAlias www.rozer.fun

    DocumentRoot /var/www/menu_frontend
    <Directory /var/www/menu_frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # SPA fallback (skip API + storage + assets + Reverb endpoints)
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/storage/
    RewriteCond %{REQUEST_URI} !^/assets/
    RewriteCond %{REQUEST_URI} !^/app
    RewriteCond %{REQUEST_URI} !^/apps
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]

    ProxyPreserveHost On
    ProxyTimeout 300

    # Reverb WebSocket and API endpoints
    ProxyPass /app ws://127.0.0.1:8080/app retry=0 timeout=300
    ProxyPassReverse /app ws://127.0.0.1:8080/app
    ProxyPass /apps http://127.0.0.1:8080/apps retry=0 timeout=300
    ProxyPassReverse /apps http://127.0.0.1:8080/apps

    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    ProxyPass /storage http://127.0.0.1:8000/storage
    ProxyPassReverse /storage http://127.0.0.1:8000/storage

    ErrorLog ${APACHE_LOG_DIR}/menu_error.log
    CustomLog ${APACHE_LOG_DIR}/menu_access.log combined
</VirtualHost>
