services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menu_api_app
    env_file:
      - .env.production
    environment:
      RUN_MIGRATIONS: "true"
      RUN_STORAGE_LINK: "true"
      RUN_CONFIG_CACHE: "true"
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      - db
      - reverb
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: menu_api_db
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - docker/db.env
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menu_api_reverb
    env_file:
      - .env.production
    environment:
      RUN_MIGRATIONS: "false"
      RUN_STORAGE_LINK: "false"
      RUN_CONFIG_CACHE: "false"
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",8080); if(!$$s){exit(1);} fclose($$s);'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  db_data:
  storage_data:
