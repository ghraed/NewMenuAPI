services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menu_api_app_dev
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
      RUN_STORAGE_LINK: "true"
      RUN_CONFIG_CACHE: "false"
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
    depends_on:
      - db
      - reverb

  db:
    image: mysql:8.0
    container_name: menu_api_db_dev
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - docker/db.env
    volumes:
      - db_data:/var/lib/mysql

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menu_api_reverb_dev
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
      RUN_STORAGE_LINK: "false"
      RUN_CONFIG_CACHE: "false"
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",8080); if(!$$s){exit(1);} fclose($$s);'"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  storage_data:
  vendor_data:
